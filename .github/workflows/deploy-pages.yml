name: Deploy static STEP/3D site

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Block CAD and archive files
        run: bash scripts/check-no-cad.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp index.html app.js analytics.js analytics-config.js styles.css THIRD_PARTY_NOTICES.md .nojekyll _site/
          cp -R vendor _site/vendor
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          if [ -f og.png ]; then cp og.png _site/og.png; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
